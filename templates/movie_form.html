{% extends "base.html" %}
{% block content %}
<h2>{{ "Edit Movie" if movie else "Add Movie" }}</h2>
<form method="post" class="mt-3" style="max-width:500px">

  <div class="mb-3">
    <label class="form-label">Title</label>
    <input name="title" class="form-control" required
           value="{{ movie.title if movie else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Release Year</label>
    <input name="release_year" type="number" class="form-control"
           value="{{ movie.release_year if movie else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Genre</label>
    <!-- Populated dynamically from Genres table in the database -->
    <select name="genre_id" class="form-select" required>
      {% for g in genres %}
      <option value="{{ g.genre_id }}"
        {{ 'selected' if movie and movie.genre_id == g.genre_id else '' }}>
        {{ g.name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Director</label>
    <small class="text-muted d-block mb-1">Choose from the list or type a new name</small>
    <!-- datalist: suggestions come from the Directors table (dynamic),
         but the user can also type any custom name -->
    <input name="director_name" class="form-control" required
           list="director-list" autocomplete="off"
           placeholder="e.g. Christopher Nolan"
           value="{{ current_director if current_director else '' }}">
    <datalist id="director-list">
      {% for d in directors %}
      <option value="{{ d.name }}">
      {% endfor %}
    </datalist>
  </div>

  <div class="mb-3">
    <label class="form-label">Duration (minutes)</label>
    <input name="duration_min" type="number" class="form-control"
           value="{{ movie.duration_min if movie else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Rating (0–10)</label>
    <input name="rating" type="number" step="0.1" min="0" max="10" class="form-control"
           value="{{ movie.rating if movie else '' }}">
  </div>

  <button type="submit" class="btn btn-primary">
    {{ "Save Changes" if movie else "Add Movie" }}
  </button>
  <a href="/movies" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
